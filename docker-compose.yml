version: "3.9"

services:
  postgres:
    image: postgres:15-alpine
    container_name: recruitment-postgres
    environment:
      POSTGRES_DB: app_db
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: postgres
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U postgres -d app_db"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./api/postgres-init:/docker-entrypoint-initdb.d
    restart: unless-stopped

  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: recruitment-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: guest
      RABBITMQ_DEFAULT_PASS: guest
    healthcheck:
      test: ["CMD", "rabbitmq-diagnostics", "-q", "ping"]
      interval: 30s
      timeout: 10s
      retries: 5
    ports:
      - "5672:5672"
      - "15672:15672"
    volumes:
      - rabbitmq_data:/var/lib/rabbitmq
    restart: unless-stopped

  api:
    build:
      context: ./api
      dockerfile: Dockerfile
    container_name: recruitment-api
    env_file:
      - ./api/.env
    depends_on:
      postgres:
        condition: service_healthy
      rabbitmq:
        condition: service_healthy
    ports:
      - "8000:8000"
    restart: unless-stopped

  integration-hh:
    build:
      context: ./integration-hh
      dockerfile: Dockerfile
    container_name: recruitment-integration-hh
    env_file:
      - ./integration-hh/.env
    depends_on:
      rabbitmq:
        condition: service_healthy
      api:
        condition: service_started
    ports:
      - "8001:8001"
    restart: unless-stopped

  notifications:
    build:
      context: ./notifications
      dockerfile: Dockerfile
    container_name: recruitment-notifications
    env_file:
      - ./notifications/.env
    depends_on:
      api:
        condition: service_started
    restart: unless-stopped

volumes:
  postgres_data:
  rabbitmq_data:

